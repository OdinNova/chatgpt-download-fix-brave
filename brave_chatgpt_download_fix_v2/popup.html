<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ChatGPT Download Rescue - Brave</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 12px;
        min-width: 500px;
        color: #111;
      }
      .row {
        margin-bottom: 8px;
      }
      button {
        margin-right: 8px;
        margin-bottom: 8px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .log {
        border-top: 1px solid #ddd;
        padding: 8px 0;
      }
      .muted {
        color: #666;
      }
      .panel {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 10px;
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <button id="redownload">Download last direct URL</button>
      <button id="open">Open last direct URL in tab</button>
      <button id="clear">Clear logs</button>
      <button id="refresh">Refresh</button>
    </div>

    <div class="panel">
      <div id="summary" class="muted">Loading…</div>
    </div>

    <div class="panel">
      <div><strong>Last capture</strong></div>
      <div id="capture" class="mono muted">No capture yet.</div>
    </div>

    <div class="panel">
      <div><strong>Logs</strong></div>
      <div id="logs"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
